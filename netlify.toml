[build]
  # This is the command to build your Vite project
  command = "npm run build"

  # This is the directory where your serverless functions are
  functions = "api/"

  # This is the directory that gets published to the web
  publish = "dist/"

[dev]
  # Enable local development with functions
  functions = "api"
  port = 5173

# This is a redirect rule that makes your single-page app work correctly
# It tells Netlify to send all page requests to index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# API functions redirects for local development
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200